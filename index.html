<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>業務ダッシュボード</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400..700&family=Plus+Jakarta+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Avoid FOUC: apply persisted Chakra color mode before React mounts.
      // Chakra v2 stores under `chakra-ui-color-mode` and reads `data-theme` on html.
      (function () {
        try {
          var t = window.localStorage.getItem('chakra-ui-color-mode');
          var v = t === 'dark' || t === 'light' ? t : 'light';
          document.documentElement.setAttribute('data-theme', v);
          document.documentElement.style.colorScheme = v;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
